            <ul class="navigation-menu">
                <li>
                    <a class="navigation-menu-link" routerLink="/home" routerLinkActive="current-page">Главная</a>
                </li>
                <li>
                    <a class="navigation-menu-link" routerLink="/blog" routerLinkActive="current-page">Блог</a>

                    <button class="theme-toggle" (click)="toggleTheme()" title="Сменить тему">

            </ul>
        </nav>
