<aside class="blog-aside-bar">
    <button class="mobile-menu-toggle"><img class="aside-logo" src="assets/toggle-logo.png"
             alt="Кнопка для открытия сайд-бара"></button>
    <button class="make-post-aside" title="Создать статью"><img class="aside-logo" src="assets/make-post-logo.png"
             alt="логотип кнопки 'создать статью'"></button>
    <button class="statistics-aside" title="Посмотреть статистику"><img class="aside-logo"
             src="assets/statistics-logo.png">
    </button>
    <dialog class="stats-dialog">
        <button class="close-stats-button"><img class="close-stats-logo" src="assets/cancel-dialog.png"
                 alt="Закрытие диалогового окна"></button>
        <h3>Статистика страницы</h3>
        <div class="stats-container">
            <div class="stat-card">
                <div class="stat-label">Всего статей:</div>
                <div class="stat-value posts-count">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Комментарии:</div>
                <div class="stat-value comments-count">0</div>
            </div>
        </div>
    </dialog>
</aside>
<main>
    <div class="container">
        <section>
            <h1 class="blog-title">Статьи</h1>
            <div class="loader"></div>
            <div class="blog">
                <article class="blog-post">
                    <button class="delete-post-button"><img class="delete-post-logo"
                             src="assets/delete-post.png"></button>
                    <div class="post">
                        <span class="post-theme">Мистика</span>
                        <h3 class="post-title" title="Проверка блога"></h3>
                        <p class="post-time">
                            Опубликовано <time>Только что</time>
                        </p>
                        <p class="post-text">
                            Проверка
                        </p>
                    </div>
                    <img class="blog-image" src="assets/kotikhi.gif" alt="">
                </article>
            </div>
            <div class="no-posts">
                <p>Здесь пока нет статей, но вы можете это исправить!</p>
            </div>
        </section>
        <section class="make-post-section" id="make-post">
            <div class="make-post-container">
                <h2>Добавить статью</h2>
                <form class="make-post" method="post">
                    <div>
                        <label for="make-post-image">Изображение</label>
                        <input class="make-post-image" id="make-post-image" type="file" name="image"
                               placeholder="Изображение" accept="image/*">
                        <label for="make-post-image" class="make-post-image-label">
                            Загрузить картинку
                        </label>
                    </div>
                    <div>
                        <label for="make-post-theme">Тема</label>
                        <select class="make-post-theme" name="select">
                            <option value="Наука">Наука</option>
                            <option value="Мистика">Мистика</option>
                            <option value="Тайны современности">Тайны современности</option>
                            <option value="other">Другое (введите тему)</option>
                        </select>
                        <input class="make-post-theme-custom" type="text" placeholder="Тема" minlength="1"
                               maxlength="20" style="display: none;">
                    </div>
                    <div>
                        <label for="make-post-title">Заголовок</label>
                        <input class="make-post-title" type="text" id="name" name="title" placeholder="Заголовок"
                               required minlength="1">
                    </div>
                    <div>
                        <label for="make-post-text">Текст статьи</label>
                        <textarea class="make-post-text" placeholder="Текст статьи" id="story" name="story" rows="5"
                                  cols="33" required></textarea>
                    </div>
                    <div class="make-post-buttons">
                        <button type="submit" class="make-post-button">Добавить</button>
                        <button type="reset" class="undo-post-button">Отмена</button>
                    </div>
                </form>
            </div>
        </section>
    </div>
</main>
<template class="post-template">
    <article class="blog-post">
        <button class="delete-post-button"><img class="delete-post-logo" src="assets/delete-post.png"></button>
        <div class="post">
            <span class="post-theme"></span>
            <h3 class="post-title" title="Клонирование статей с котами?!"></h3>
            <p class="post-time">
                Опубликовано <time></time>
            </p>
            <p class="post-text">
            </p>
        </div>
        <img class="blog-image" src="" alt="">
    </article>
</template>
