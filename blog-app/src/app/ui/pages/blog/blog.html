<aside class="blog-aside-bar" [class.is-open]="isMobileMenuOpen">
    <button class="mobile-menu-toggle" (click)="toggleMobileMenu()">
        <img class="aside-logo" src="assets/toggle-logo.png">
    </button>
    <button class="make-post-aside" title="Создать статью" (click)="openMakePost()">
        <img class="aside-logo" src="assets/make-post-logo.png">
    </button>
    <button class="statistics-aside" title="Посмотреть статистику" (click)="openStats()">
        <img class="aside-logo" src="assets/statistics-logo.png">
    </button>

    <dialog class="stats-dialog" #statsDialog (click)="onDialogClick($event)">
        <button class="close-stats-button" (click)="closeStats()">
            <img class="close-stats-logo" src="assets/cancel-dialog.png">
        </button>
        <h3>Статистика страницы</h3>
        <div class="stats-container">
            <div class="stat-card">
                <div class="stat-label">Всего статей:</div>
                <div class="stat-value posts-count">{{ posts.length }}</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Комментарии:</div>
                <div class="stat-value comments-count">0</div>
            </div>
        </div>
    </dialog>
</aside>

<main>
    <div class="container">
        <section>
            <h1 class="blog-title">Статьи</h1>

            @if (isLoading) {
            <div class="loader" style="display: block;"></div>
            } @else {
            <div class="blog">
                @for (p of posts; track p.id) {
                <app-blog-post [post]="p" (deletePostEvent)="deletePost($event)" (editPostEvent)="editPost($event)">
                </app-blog-post>
                } @empty {
                <div class="no-posts" style="display: block;">
                    <p>Здесь пока нет статей, но вы можете это исправить!</p>
                </div>
                }
            </div>
            }
        </section>

        @if (isMakePostOpen) {
        <app-make-post [postToEdit]="selectedPost" (postCreated)="handleSavePost($event)"
                       (cancelForm)="closeMakePost()">
        </app-make-post>
        }

    </div>
</main>
